<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fellas v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0a0a;--surface:#111418;--card:#161b20;
  --border:#1e2328;--border2:#252d35;
  --silver:#9aa5b4;--accent:#6b8fa8;
  --green:#4caf7d;--red:#e05656;
  --text:#dde3ea;--muted:#52606e;--muted2:#7a8a98;
  --sw:260px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:url('fondo.png');background-repeat:no-repeat;background-position:center center;background-size:40%;z-index:0;opacity:0.15;pointer-events:none}
#loading,#login,#app{position:relative;z-index:1}
